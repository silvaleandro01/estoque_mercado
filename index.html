<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Mercado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Login (Token) -->
    <div id="login-screen" class="container hidden">
        <h2>Acesso ao Sistema</h2>
        <p>Insira seu Token de acesso (Bearer Token)</p>
        <input type="text" id="token-input" placeholder="Cole seu token aqui...">
        <button onclick="login()">Entrar</button>
    </div>

    <!-- Layout Principal -->
    <div id="main-layout" class="container hidden">
        <nav class="sidebar">
            <h3>Mercado 24h</h3>
            <ul>
                <li onclick="navegar('dashboard')">Dashboard</li>
                <li onclick="navegar('estoque')">Estoque</li>
                <li onclick="navegar('vendas')">Vendas</li>
                <li onclick="navegar('funcionarios')">Funcionários</li>
                <li onclick="logout()" class="danger">Sair</li>
            </ul>
        </nav>

        <main class="content">
            <div id="view-dashboard" class="view">
                <h2>Bem-vindo ao Sistema</h2>
                <p>Selecione uma opção no menu.</p>
                <div class="card">
                    <h3>Status do Sistema</h3>
                    <p>Conectado ao backend.</p>
                </div>
            </div>
            
            <div id="view-estoque" class="view hidden">
                <!-- Injetado via JS -->
            </div>
            
            <div id="view-vendas" class="view hidden">
                <!-- Injetado via JS -->
            </div>
            
            <div id="view-funcionarios" class="view hidden">
                <!-- Injetado via JS -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
